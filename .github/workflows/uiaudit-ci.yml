# Demo GitHub Actions Workflow for UiAudit
# Copy this file to .github/workflows/uiaudit-ci.yml in your own repository.
# (Triggers are set to [] in this demo file so GitHub Actions does not run it on this repository itself)

name: UiAudit CI Gate Example

on: [] # Disabled trigger for demo template

jobs:
  audit:
    name: Audit UI Components
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run UiAudit Gate
        run: npx uiaudit audit ./src --fail-on critical --min-score 80
